<!DOCTYPE html>
<html>
<head>
<title>Kowboyzz Fantasy League | IPL 2026</title>

<style>
/* ===================== */
/* 🌐 BASE STYLING */
/* ===================== */
body {
  font-family: Arial, sans-serif;
  background: #0b1a2f;
  color: white;
  margin: 0;
  padding: 0;
}

/* Title */
h1 {
  text-align: center;
  margin: 15px 0;
}

/* ===================== */
/* 🧱 LAYOUT */
/* ===================== */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

.left-panel,
.right-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===================== */
/* 📦 CARDS */
/* ===================== */
.card {
  background: #1e2d44;
  padding: 20px;
  margin: 10px;
  width: 90%;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Card headings */
.card h3 {
  text-align: center;
  color: #ffd700;
}

/* ===================== */
/* 🧾 FORM ELEMENTS */
/* ===================== */
label {
  font-size: 14px;
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

select,
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: white;
  color: black;
  font-weight: bold;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

/* Dropdown options */
select option {
  color: black;
  background: white;
}

/* ===================== */
/* 🔘 BUTTONS */
/* ===================== */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.submit {
  background: #28a745;
  color: white;
}

.submit:hover {
  background: #218838;
}

/* ===================== */
/* 📊 TABLE (OVERALL BOARD) */
/* ===================== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #142c4f;
  color: #ffd700;
  padding: 10px;
}

td {
  background: #0f2238;
  color: white;   /* 👈 ADD THIS */
  padding: 10px;
  text-align: center;
}

tr:nth-child(even) td {
  background: #112a44;
}

/* ===================== */
/* 🏆 MATCH LIST */
/* ===================== */
ul {
  list-style: none;
  padding: 0;
}

li {
  background: #0f2238;
  margin: 6px 0;
  padding: 10px;
  border-radius: 6px;
  font-weight: bold;
  text-align: center;
}

li {
  display: flex;
  justify-content: space-between;
}

/* ===================== */
/* 📱 MOBILE RESPONSIVE */
/* ===================== */
@media (max-width: 768px) {
  .main-layout {
    grid-template-columns: 1fr;
  }

  .card {
    width: 95%;
  }
}
</style>
</head>

<body>

<h1>🏏Kowboyzz Fantasy League | IPL 2026</h1>

<!-- LOGIN (VISIBLE FIRST) -->
<div class="card" id="login">
  <input id="name" placeholder="Enter Name">
  <input id="pass" placeholder="Admin Password (optional)">

      <label>Winner</label>
      <select id="winner"></select>

      <label>Batsman</label>
      <select id="batsman"><option>KOHLI</option><option>ROHIT</option></select>

      <label>Runs</label>
      <select id="runs"><option>150+</option><option>180+</option><option>200+</option></select>

      <label>Wicket</label>
      <select id="wicket"><option>1</option><option>2</option></select>

      <label>Sixes</label>
      <select id="sixes"><option>5+</option><option>10+</option></select>

      <button class="submit" onclick="submitAnswer()">Submit</button>
    </div>

    <!-- ADMIN -->
    <div class="card" id="adminPanel" style="display:none;">
      <h3>Admin Panel</h3>
      <select id="adminMatch" onchange="updateAdminTeams()"></select>

      <label>Winner</label>
      <select id="adminWinner"></select>

      <label>Batsman</label>
      <select id="adminBatsman"><option>KOHLI</option><option>ROHIT</option></select>

      <label>Runs</label>
      <select id="adminRuns"><option>150+</option><option>180+</option><option>200+</option></select>

      <label>Wicket</label>
      <select id="adminWicket"><option>1</option><option>2</option></select>

      <label>Sixes</label>
      <select id="adminSixes"><option>5+</option><option>10+</option></select>

      <button onclick="submitResult()">Save Result</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- MATCH -->
    <div class="card">
      <h3>🥇 Match Leaderboard</h3>
      <select id="boardMatch" onchange="loadBoards()"></select>
      <ul id="matchBoard"></ul>
    </div>

    <!-- OVERALL -->
    <div class="card">
      <h3>🏆 Overall Leaderboard</h3>
      <table id="overallBoard">
        <thead>
          <tr><th>Rank</th><th>Name</th><th>Score</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>

</div>

function isMatchLocked(matchId){
  const m = matches.find(x=>x.id===matchId);

  // Convert match date (simple logic)
  const matchTime = new Date(m.date + " 2026"); // year added
  const now = new Date();

  return now > matchTime;
}

async function login(){
  const name = document.getElementById("name").value;
  const pass = document.getElementById("pass").value;

  if(!name){
    alert("Enter name");
    return;
  }

  localStorage.setItem("user", name);

  // Hide login
  document.getElementById("login").style.display = "none";

  // Show main layout
  document.getElementById("mainLayout").style.display = "grid";

  // Admin vs User
const adminCheck = await isAdmin(name);

if(adminCheck){
    document.getElementById("adminPanel").style.display="block";
    document.getElementById("userPanel").style.display="none";
  } else {
    document.getElementById("userPanel").style.display="block";
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("welcome").innerText="Welcome " + name;
  }

  loadMatches();

  db.collection("answers").onSnapshot(loadBoards);
  db.collection("results").onSnapshot(loadBoards);

  loadBoards();
}
function loadMatches(){
  ["match","adminMatch","boardMatch"].forEach(id=>{
    const el = document.getElementById(id);
    el.innerHTML="";
    matches.forEach(m=>{
      el.innerHTML += `<option value="${m.id}">${m.home} vs ${m.away} - ${m.date}</option>`;
    });
  });

  updateTeams();
  updateAdminTeams();
}

function updateTeams(){
  const m = matches.find(x=>x.id===match.value);
  winner.innerHTML = `<option>${m.home}</option><option>${m.away}</option>`;
}

function updateAdminTeams(){
  const m = matches.find(x=>x.id===adminMatch.value);
  adminWinner.innerHTML = `<option>${m.home}</option><option>${m.away}</option>`;
}

async function submitAnswer(){

  const user = localStorage.getItem("user");
  const selectedMatch = matches.find(m => m.id === match.value);

  // 🔒 LOCK CHECK
  if(isMatchLocked(match.value)){
    alert("Prediction Locked 🔒");
    return;
  }

  const matchKey = `${selectedMatch.home}_vs_${selectedMatch.away}`;

  await db.collection("answers").doc(matchKey).set({
    [user]: {
      match: `${selectedMatch.home} vs ${selectedMatch.away}`,
      winner: winner.value,
      batsman: batsman.value,
      runs: runs.value,
      wicket: wicket.value,
      sixes: sixes.value
    }
  }, { merge:true });

  alert("Saved ✅");
}

async function submitResult(){

  const selectedMatch = matches.find(m => m.id === adminMatch.value);
  const matchKey = `${selectedMatch.home}_vs_${selectedMatch.away}`;

  await db.collection("results").doc(matchKey).set({
    winner: adminWinner.value,
    batsman: adminBatsman.value,
    runs: adminRuns.value,
    wicket: adminWicket.value,
    sixes: adminSixes.value
  });

  alert("Result saved ✅");
  loadBoards();
}

function getRankedList(arr){
  let ranked = [];
  let prevScore = null;
  let rank = 0;

  arr.forEach((item, index)=>{
    if(item.score !== prevScore){
      rank = index + 1;
    }
    ranked.push({
      user: item.user,
      score: item.score,
      rank: rank
    });
    prevScore = item.score;
  });

  return ranked;
}

async function loadBoards(){

  const answersSnap = await db.collection("answers").get();
  const resultsSnap = await db.collection("results").get();

  let answers = {}, results = {};

  answersSnap.forEach(d=>answers[d.id]=d.data());
  resultsSnap.forEach(d=>results[d.id]=d.data());

  const selectedMatch = matches.find(x => x.id === boardMatch.value);
  const m = `${selectedMatch.home}_vs_${selectedMatch.away}`;

  let matchScores = [];
  let overall = {};

  // =====================
  // MATCH LEADERBOARD
  // =====================
  if(answers[m] && results[m]){
    Object.keys(answers[m]).forEach(user=>{
      let a = answers[m][user];
      let r = results[m];

      let score = 0;
      if(a.winner===r.winner) score+=10;
      if(a.batsman===r.batsman) score+=10;
      if(a.runs===r.runs) score+=10;
      if(a.wicket===r.wicket) score+=10;
      if(a.sixes===r.sixes) score+=10;

      matchScores.push({user, score});
    });
  }

  matchScores.sort((a,b)=>b.score-a.score);

const rankedMatch = getRankedList(matchScores);

const top5 = rankedMatch.slice(0,5);

document.getElementById("matchBoard").innerHTML =
  top5.map(x=>`<li>${x.rank}. ${x.user} - ${x.score}</li>`).join("") +
  `<button onclick="showAllMatch()">View All</button>`;

window.allMatchData = rankedMatch;



  // =====================
  // 🏆 OVERALL LEADERBOARD
  // =====================
  Object.keys(answers).forEach(matchKey=>{
    if(!results[matchKey]) return;

    Object.keys(answers[matchKey]).forEach(user=>{
      let a = answers[matchKey][user];
      let r = results[matchKey];

      let score = 0;
      if(a.winner===r.winner) score+=10;
      if(a.batsman===r.batsman) score+=10;
      if(a.runs===r.runs) score+=10;
      if(a.wicket===r.wicket) score+=10;
      if(a.sixes===r.sixes) score+=10;

      overall[user] = (overall[user] || 0) + score;
    });
  });

let sorted = Object.entries(overall)
  .map(x=>({user:x[0], score:x[1]}))
  .sort((a,b)=>b.score-a.score);

const rankedOverall = getRankedList(sorted);
const top5Overall = rankedOverall.slice(0,5);

window.allOverallData = rankedOverall;

const tbody = document.querySelector("#overallBoard tbody");

tbody.innerHTML = top5Overall.map((x, i) => {

  let medal = x.rank;

  if(x.rank === 1) medal = "🥇";
  else if(x.rank === 2) medal = "🥈";
  else if(x.rank === 3) medal = "🥉";

  let style = "";

  if(x.rank === 1) style = "background: gold; color:black;";
  else if(x.rank === 2) style = "background: silver; color:black;";
  else if(x.rank === 3) style = "background: #cd7f32; color:black;";
  else style = "color:white;";

  return `
    <tr style="${style}">
      <td>${medal}</td>
      <td>${x.user}</td>
      <td>${x.score}</td>
    </tr>
  `;
}).join("") +
`<tr><td colspan="3"><button onclick="showAllOverall()">View All</button></td></tr>`;
}

function showAllMatch(){
  document.getElementById("matchBoard").innerHTML =
    window.allMatchData.map(x=>`<li>${x.rank}. ${x.user} - ${x.score}</li>`).join("");
}

function showAllOverall(){
  const tbody = document.querySelector("#overallBoard tbody");

  tbody.innerHTML = window.allOverallData.map(x=>`
    <tr>
      <td>${x.rank}</td>
      <td>${x.user}</td>
      <td>${x.score}</td>
    </tr>
  `).join("");
}
